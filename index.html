<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOEIC 多益單字挑戰</title>
    <style>
        :root { --primary: #007AFF; --bg: #f5f5f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        /* 容器共用設定 */
        .screen-container { width: 100%; max-width: 400px; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-top: 50px; display: none; box-sizing: border-box; }
        .active-screen { display: block; }
        
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        
        /* 登入與選單區塊 */
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 12px; font-size: 1.1rem; box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1.1rem; cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
        .btn-secondary { background: #FF9500; }
        
        /* 遊戲區塊 */
        .stats { display: flex; justify-content: space-between; color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        
        /* 單字顯示與按鈕列 */
        .word-header { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 30px; }
        #word-display { font-size: 2.2rem; font-weight: bold; color: #333; margin: 0; }
        .icon-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 5px; transition: 0.2s; }
        .icon-btn:active { transform: scale(0.8); }
        .heart-saved { color: #FF3B30; }
        .heart-unsaved { color: #ccc; }

        .options-grid { display: grid; gap: 12px; }
        .option-btn { padding: 16px; border: 2px solid #eee; border-radius: 12px; background: white; font-size: 1.1rem; cursor: pointer; transition: 0.2s; text-align: left; }
        .option-btn:active { transform: scale(0.98); background: #f0f0f0; }
        .correct { background: #4CD964 !important; color: white; border-color: #4CD964; }
        .wrong { background: #FF3B30 !important; color: white; border-color: #FF3B30; }
        #feedback { margin-top: 20px; text-align: center; height: 50px; color: #666; font-style: italic; display: flex; flex-direction: column; justify-content: center; }
        .streak-msg { color: #FF9500; font-weight: bold; font-style: normal; margin-top: 5px; }
        
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 100; font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        
        /* 回主選單按鈕 */
        .back-btn { text-align: center; margin-top: 15px; color: var(--primary); cursor: pointer; font-size: 0.9rem; text-decoration: underline; }
        .reminder { text-align: center; font-size: 0.8rem; color: #999; margin-top: 15px; }
    </style>
</head>
<body>

<audio id="tts-player" playsinline></audio>

<div id="loading-screen" class="loading">載入多益單字庫中...</div>

<div id="login-screen" class="screen-container">
    <h2>登入你的學習帳號</h2>
    <input type="text" id="username" placeholder="請輸入你的名字..." autocomplete="off">
    <button class="btn-primary" onclick="login()">開始學習</button>
</div>

<div id="menu-screen" class="screen-container">
    <h2 id="welcome-msg">歡迎</h2>
    <p style="text-align: center; color: #666; margin-bottom: 20px;">目前你的錯題庫共有 <b id="saved-count">0</b> 個單字</p>
    <button class="btn-primary" onclick="startGame('all')">一、隨機單元 (所有單字)</button>
    <button class="btn-primary btn-secondary" onclick="startGame('saved')">二、單字複習 (只測驗錯題/愛心)</button>
    <div class="back-btn" onclick="logout()">切換使用者</div>
    <div class="reminder">💡 手機若無聲音，請確認是否關閉了實體靜音鍵</div>
</div>

<div id="game-container" class="screen-container">
    <div class="stats">
        <span>分數: <b id="score">0</b></span>
        <span>進度: <b id="progress">0</b>/10</span>
    </div>
    
    <div class="word-header">
        <button class="icon-btn" onclick="playAudio()">🔊</button>
        <div id="word-display">Loading...</div>
        <button class="icon-btn heart-unsaved" id="heart-btn" onclick="toggleHeart()">🤍</button>
    </div>
    
    <div class="options-grid" id="options"></div>
    <div id="feedback"></div>
    <div class="back-btn" onclick="showMenu()">放棄測驗，回主選單</div>
</div>

<script>
    const SHEET_ID = '1OmBnWJ00RFGq6ppBxEmnR2ipT_-RyqRAo3DTZc3915M'; 
    let vocabData = [];
    let savedWords = []; 
    let currentVocabList = []; 
    let currentQuestion = null;
    let score = 0;
    let count = 0;
    let currentUser = "";
    let currentMode = "all"; 

    // 1. 初始化與讀取資料
    async function init() {
        try {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
            const resp = await fetch(url);
            const text = await resp.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            
            vocabData = json.table.rows.map(row => ({
                word: row.c[0]?.v || "",
                meaning: row.c[1]?.v || "",
                example: row.c[2]?.v || ""
            })).filter(v => v.word !== "");

            document.getElementById('loading-screen').style.display = 'none';
            
            const savedUser = localStorage.getItem('toeic_currentUser');
            if (savedUser) {
                document.getElementById('username').value = savedUser;
                login();
            } else {
                switchScreen('login-screen');
            }
        } catch (e) {
            alert("資料載入失敗，請檢查 Sheet ID 是否正確並已發佈到網路。");
        }
    }

    function switchScreen(screenId) {
        document.querySelectorAll('.screen-container').forEach(el => el.classList.remove('active-screen'));
        document.getElementById(screenId).classList.add('active-screen');
    }

    // 2. 登入系統
    function login() {
        const nameInput = document.getElementById('username').value.trim();
        if (!nameInput) {
            alert("請輸入名字喔！");
            return;
        }
        currentUser = nameInput;
        localStorage.setItem('toeic_currentUser', currentUser);
        
        const savedData = localStorage.getItem(`toeic_saved_${currentUser}`);
        savedWords = savedData ? JSON.parse(savedData) : [];
        
        showMenu();
    }

    function logout() {
        localStorage.removeItem('toeic_currentUser');
        document.getElementById('username').value = "";
        switchScreen('login-screen');
    }

    function showMenu() {
        document.getElementById('welcome-msg').innerText = `歡迎回來，${currentUser}！`;
        document.getElementById('saved-count').innerText = savedWords.length;
        switchScreen('menu-screen');
    }

    // 3. 開始測驗
    function startGame(mode) {
        // 🔥 【極短靜音檔解鎖】在點擊按鈕瞬間，播放一段極短的空白音檔，徹底解鎖手機瀏覽器的 Audio 權限
        const audioPlayer = document.getElementById('tts-player');
        audioPlayer.src = "data:audio/mpeg;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjI5LjEwMAAAAAAAAAAAAAAA//OUwAAAAAAAAAAAAFhpbmcAAAAPAAAAAgAAAAMAAABfWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhY//OUwAQAAB4RDQAQQAQAAADSAAAAABMYXZjNTguNTQuMTAwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA";
        audioPlayer.play().catch(() => {}); 

        currentMode = mode;
        if (mode === 'saved') {
            if (savedWords.length === 0) {
                alert("你的錯題庫目前是空的喔！請先在隨機單元中學習。");
                return;
            }
            currentVocabList = [...savedWords];
        } else {
            currentVocabList = [...vocabData];
        }

        score = 0;
        count = 0;
        document.getElementById('score').innerText = score;
        document.getElementById('progress').innerText = count;
        
        switchScreen('game-container');
        newQuestion();
    }

    // 4. 產生新題目
    function newQuestion() {
        if (count >= 10 || currentVocabList.length === 0) {
            let msg = `測驗結束！你的得分是：${score}`;
            if (currentMode === 'saved' && currentVocabList.length === 0 && count > 0) {
                msg = `太棒了！錯題庫的單字都被你消滅了！得分：${score}`;
            }
            alert(msg);
            showMenu();
            return;
        }

        currentQuestion = currentVocabList[Math.floor(Math.random() * currentVocabList.length)];
        
        let distractors = vocabData
            .filter(v => v.word !== currentQuestion.word)
            .sort(() => 0.5 - Math.random())
            .slice(0, 3);

        let choices = [...distractors, currentQuestion].sort(() => 0.5 - Math.random());

        document.getElementById('word-display').innerText = currentQuestion.word;
        document.getElementById('feedback').innerHTML = "";
        updateHeartUI();
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = "";

        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = choice.meaning;
            btn.onclick = () => checkAnswer(choice, btn);
            optionsDiv.appendChild(btn);
        });

        playAudio();
    }

    // 5. 檢查答案
    function checkAnswer(choice, btn) {
        const allButtons = document.querySelectorAll('.option-btn');
        allButtons.forEach(b => b.disabled = true);

        const feedbackDiv = document.getElementById('feedback');

        if (choice.word === currentQuestion.word) {
            btn.classList.add('correct');
            score += 10;
            document.getElementById('score').innerText = score;
            
            let feedbackHTML = `<div>Excellent! ${currentQuestion.example}</div>`;

            if (currentMode === 'saved') {
                let savedWordIndex = savedWords.findIndex(w => w.word === currentQuestion.word);
                if (savedWordIndex !== -1) {
                    savedWords[savedWordIndex].correctCount = (savedWords[savedWordIndex].correctCount || 0) + 1;
                    let currentStreak = savedWords[savedWordIndex].correctCount;

                    if (currentStreak >= 3) {
                        feedbackHTML += `<div class="streak-msg">🎉 連續答對 3 次，已自動從錯題庫移除！</div>`;
                        removeWordFromUser(currentQuestion.word);
                    } else {
                        feedbackHTML += `<div class="streak-msg">連續答對：${currentStreak} / 3 次</div>`;
                        localStorage.setItem(`toeic_saved_${currentUser}`, JSON.stringify(savedWords));
                    }
                }
            }
            feedbackDiv.innerHTML = feedbackHTML;

        } else {
            btn.classList.add('wrong');
            feedbackDiv.innerHTML = `<div>正確答案是: ${currentQuestion.meaning}</div>`;
            
            saveWordToUser(currentQuestion);
        }

        count++;
        document.getElementById('progress').innerText = count;
        
        setTimeout(newQuestion, 2500);
    }

    // 6. 🔥 語音功能 (改用 Google Translate TTS API)
    function playAudio() {
        if (!currentQuestion) return;
        
        const audioPlayer = document.getElementById('tts-player');
        // 將單字編碼並向 Google 請求真實的語音 MP3
        const word = encodeURIComponent(currentQuestion.word);
        audioPlayer.src = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=en-US&q=${word}`;
        
        // 播放音檔
        audioPlayer.play().catch(err => {
            console.log("語音播放被阻擋：", err);
        });
    }

    // 7. 愛心/錯題庫管理
    function saveWordToUser(wordObj) {
        let existingWord = savedWords.find(w => w.word === wordObj.word);
        if (!existingWord) {
            savedWords.push({ ...wordObj, correctCount: 0 });
            localStorage.setItem(`toeic_saved_${currentUser}`, JSON.stringify(savedWords));
            updateHeartUI();
        } else {
            existingWord.correctCount = 0;
            localStorage.setItem(`toeic_saved_${currentUser}`, JSON.stringify(savedWords));
            updateHeartUI(); 
        }
    }

    function removeWordFromUser(wordString) {
        savedWords = savedWords.filter(w => w.word !== wordString);
        localStorage.setItem(`toeic_saved_${currentUser}`, JSON.stringify(savedWords));
        
        if (currentMode === 'saved') {
            currentVocabList = currentVocabList.filter(w => w.word !== wordString);
        }
        
        updateHeartUI();
    }

    function toggleHeart() {
        const exists = savedWords.find(w => w.word === currentQuestion.word);
        if (exists) {
            removeWordFromUser(currentQuestion.word);
        } else {
            saveWordToUser(currentQuestion);
        }
    }

    function updateHeartUI() {
        if (!currentQuestion) return;
        const heartBtn = document.getElementById('heart-btn');
        const exists = savedWords.find(w => w.word === currentQuestion.word);
        
        if (exists) {
            heartBtn.innerText = '❤️';
            heartBtn.className = 'icon-btn heart-saved';
        } else {
            heartBtn.innerText = '🤍';
            heartBtn.className = 'icon-btn heart-unsaved';
        }
    }

    init();
</script>

</body>
</html>
