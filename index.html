<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOEIC 多益單字挑戰</title>
    <style>
        :root { --primary: #007AFF; --bg: #f5f5f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        #game-container { width: 100%; max-width: 400px; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-top: 50px; }
        .stats { display: flex; justify-content: space-between; color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        #word-display { font-size: 2.2rem; font-weight: bold; color: #333; text-align: center; margin-bottom: 30px; }
        .options-grid { display: grid; gap: 12px; }
        .option-btn { padding: 16px; border: 2px solid #eee; border-radius: 12px; background: white; font-size: 1.1rem; cursor: pointer; transition: 0.2s; text-align: left; }
        .option-btn:active { transform: scale(0.98); background: #f0f0f0; }
        .correct { background: #4CD964 !important; color: white; border-color: #4CD964; }
        .wrong { background: #FF3B30 !important; color: white; border-color: #FF3B30; }
        #feedback { margin-top: 20px; text-align: center; height: 50px; color: #666; font-style: italic; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

<div id="loading-screen" class="loading">載入多益單字庫中...</div>

<div id="game-container">
    <div class="stats">
        <span>分數: <b id="score">0</b></span>
        <span>進度: <b id="progress">0</b>/10</span>
    </div>
    
    <div id="word-display">Loading...</div>
    
    <div class="options-grid" id="options">
        </div>

    <div id="feedback"></div>
</div>

<script>
    // 這裡替換成你的 Google Sheet ID
    const SHEET_ID = '1OmBnWJ00RFGq6ppBxEmnR2ipT_-RyqRAo3DTZc3915M'; 
    let vocabData = [];
    let currentQuestion = null;
    let score = 0;
    let count = 0;

    // 1. 從 Google Sheets 抓取資料
    async function init() {
        try {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
            const resp = await fetch(url);
            const text = await resp.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            
            vocabData = json.table.rows.map(row => ({
                word: row.c[0]?.v || "",
                meaning: row.c[1]?.v || "",
                example: row.c[2]?.v || ""
            }));

            document.getElementById('loading-screen').style.display = 'none';
            newQuestion();
        } catch (e) {
            alert("資料載入失敗，請檢查 Sheet ID 是否正確並已發佈到網路。");
        }
    }

    // 2. 產生新題目
    function newQuestion() {
        if (count >= 10) {
            alert(`挑戰結束！你的得分是：${score}`);
            location.reload();
            return;
        }

        // 隨機選一個正確答案
        currentQuestion = vocabData[Math.floor(Math.random() * vocabData.length)];
        
        // 隨機選三個錯誤答案 (Distractors)
        let distractors = vocabData
            .filter(v => v.word !== currentQuestion.word)
            .sort(() => 0.5 - Math.random())
            .slice(0, 3);

        // 合併並打亂選項
        let choices = [...distractors, currentQuestion].sort(() => 0.5 - Math.random());

        // 更新 UI
        document.getElementById('word-display').innerText = currentQuestion.word;
        document.getElementById('feedback').innerText = "";
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = "";

        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = choice.meaning;
            btn.onclick = () => checkAnswer(choice, btn);
            optionsDiv.appendChild(btn);
        });
    }

    // 3. 檢查答案
    function checkAnswer(choice, btn) {
        const allButtons = document.querySelectorAll('.option-btn');
        allButtons.forEach(b => b.disabled = true); // 防止重複點擊

        if (choice.word === currentQuestion.word) {
            btn.classList.add('correct');
            score += 10;
            document.getElementById('score').innerText = score;
            document.getElementById('feedback').innerText = "Excellent! " + currentQuestion.example;
        } else {
            btn.classList.add('wrong');
            document.getElementById('feedback').innerText = `正確答案是: ${currentQuestion.meaning}`;
        }

        count++;
        document.getElementById('progress').innerText = count;
        
        setTimeout(newQuestion, 2500); // 2.5 秒後下一題
    }

    init();
</script>

</body>
</html>
